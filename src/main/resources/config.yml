# NationCore Configuration
# Version 2.0.0

# General Settings
general:
  prefix: "&6[NationCore]&r"
  language: "en"

nation:
  capital:
    # Default capital radius in blocks from the claim point.
    default-radius: 50
    # Whether the capital territory is protected from non-member griefing.
    protect: true
    # Capital claiming cost (withdrawn from the nation's treasury). Set to 0 for free.
    claim-cost: 0

  # ============================================================
  # Border Management — territory expansion & capital relocation
  # ============================================================
  # Configure Border Management features (menu per nation type). All
  # costs below are withdrawn from the LEADER's Vault balance, not the nation's treasury.
  territory:
    # Cost to claim one chunk of new territory (withdrawn from the leader's Vault).
    claim-cost: 25000
    # Cost of relocating the capital to an already owned chunk.
    capital-relocate-cost: 50000
    # Real-time cooldown (hours) between capital relocations.
    capital-relocate-cooldown-hours: 24



# ============================================================
# Cross-Plugin Integration (soft-depend)
# ============================================================
# Settings for optional integrations with other plugins. These only take effect
# when the partner plugin is installed; NationCore runs perfectly fine without
# any of them.
integration:
  # ----------------------------------------------------------
  # FactoryCore -> NationCore  centralized factory tax
  # ----------------------------------------------------------
  # When a FactoryCore factory sits inside a nation's claimed territory, the tax
  # the owner pays in FactoryCore's tax system is forwarded into THAT nation's
  # treasury instead of vanishing into the void.
  #
  # IMPORTANT: this is the NationCore (receiving) side of the switch. FactoryCore
  # has its own matching switch (integration.nation-tax.enabled). BOTH plugins
  # must have the integration enabled for any money to move — a deliberate
  # two-key safety design so neither server operator can be surprised.
  factory-tax:
    # Master switch for accepting routed factory taxes into nation treasuries.
    enabled: true
    # Percentage of each factory tax payment that is banked into the owning
    # nation's treasury (0-100). The remainder behaves exactly as before
    # (consumed by FactoryCore). Values outside 0-100 are clamped.
    share-percent: 100.0
    # Anti-abuse cap: the maximum amount a SINGLE tax payment may add to a
    # treasury. Protects against treasury inflation from misconfigured or
    # exploited factory prices. Set to 0 to disable the cap.
    max-per-payment: 0.0
    # Log every routed payment to the server console for auditing.
    log: true

  # ----------------------------------------------------------
  # ApartmentCore -> NationCore  centralized apartment tax
  # ----------------------------------------------------------
  # When an ApartmentCore apartment's region sits inside a nation's claimed
  # territory, the tax the owner pays in ApartmentCore's tax system is forwarded
  # into THAT nation's treasury instead of vanishing into the void.
  #
  # IMPORTANT: this is the NationCore (receiving) side of the switch. ApartmentCore
  # has its own matching switch (integration.nation-tax.enabled). BOTH plugins
  # must have the integration enabled for any money to move — a deliberate
  # two-key safety design so neither server operator can be surprised.
  #
  # This block is fully independent from factory-tax above: apartment and factory
  # tax routing are enabled, shared, and capped separately.
  apartment-tax:
    # Master switch for accepting routed apartment taxes into nation treasuries.
    enabled: true
    # Percentage of each apartment tax payment that is banked into the owning
    # nation's treasury (0-100). The remainder behaves exactly as before
    # (consumed by ApartmentCore). Values outside 0-100 are clamped.
    share-percent: 100.0
    # Anti-abuse cap: the maximum amount a SINGLE tax payment may add to a
    # treasury. Protects against treasury inflation from misconfigured or
    # exploited apartment prices. Set to 0 to disable the cap.
    max-per-payment: 0.0
    # Log every routed payment to the server console for auditing.
    log: true

