# =====================================================================
#  NATION CORE - EXECUTIVE ORDER CATALOGUE (order.yaml)
# =====================================================================
# Central management file for EVERY executive order registered in the
# plugin. Editing a value here immediately affects that order across all
# governments (Republic, Communist, Monarchy, Caliphate).
#
# The KEY of each entry is the internal order id. It must NOT be renamed
# because it is referenced by the per-nation configs in nations/*.yaml
# (see the "executive_order" section of each government file).
#
# Fields
#   status    : true/false  -> master switch. false completely disables
#                              the order (hidden from menus, cannot be issued).
#   display   : the name shown in every executive-order menu / broadcast.
#   lore      : descriptive lines rendered inside the order card.
#   cooldown  : per-order cooldown in DAYS before it can be re-issued by the
#               same nation. (Monarchy ignores cooldowns — royal prerogative.)
#   cost      : treasury cost (in dollars) to authorize the order.
#   attribute : OPTIONAL. Order-specific tuning values. Only the attributes
#               relevant to an order have any effect (see comments below).
#                 duration -> active duration in HOURS (0 = instant order).
#                 damage   -> combat/PvP multiplier for combat-type orders.
#                 vault    -> economy value (multiplier OR flat payout,
#                             depending on the order — see each entry).
# =====================================================================

golden_age:
  status: true
  display: "Golden Age Decree"
  lore:
  - "The leader declares a Golden Age of prosperity."
  - "+25% XP gain, boosted vault points and rarer drops"
  - "for every citizen of the nation."
  cooldown: 7
  cost: 1000000
  attribute:
    duration: 48   # hours the buff stays active
    vault: 1.25    # vault-point multiplier while active

war_economy:
  status: true
  display: "War Economy"
  lore:
  - "The nation calls its warriors to arms."
  - "Double PvP kill rewards and increased PvP damage."
