creation:
  display: "&eMonarchy"
  description:
    - "&7Absolute kingdom: the King rules forever with unchecked power,"
    - ""
    - "&7• Leader: &fKing (rules for life, no elections)"
    - "&7• High Council: &fChancellor, Marshal, Saint, Herald"
    - "&7• Power: &fAbsolute — King may issue any order freely"
    - "&7• Treasury: &fRoyal Treasury controlled by Chancellor"
    - "&7• Order: &fNo cooldown for the King's executive orders"
  # Cost of founding a nation (withdrawn from the founder's Vault balance).
  cost: 500000
  # Minimum playtime hours before a player can found a nation.
  # Set to 0 to disable playtime requirements.
  min-playtime-hours: 0
  # Percentage of starting capital that goes directly into the new nation's treasury (0-100).
  # Calculated as a percentage of the cost value. Example: 50 = 50% of the cost.
  starting-treasury-percent: 80

# Cabinet Settings
cabinet:
  daily-salary: 20000
  defense:
    prefix: "&4[MoD]"
    daily-vault: 30000
    decision-cooldown-hours: 48
  treasury:
    prefix: "&2[MoT]"
    daily-vault: 50000
    decision-cooldown-hours: 48
  health:
    prefix: "&d[MoH]"
    daily-vault: 25000
    decision-cooldown-hours: 48

# =====================================================================
# Executive Orders available in this kingdom.
# The High Council issues Royal Decisions from their own consoles; only
# the King may issue nation-wide executive orders. List under "king" the
# order ids (defined in order.yaml) the crown may authorize. The King is
# exempt from executive-order cooldowns (royal prerogative).
# =====================================================================
executive_order:
  king:
  - golden_age
  - war_economy
  - economic_recovery
  - environmental_protection
  - education_advancement
  - purge_protocol
  - presidential_pardon
  - tax_suspension
  - tax_surge
  herald:
  - her_royal_proclamation
  - her_royal_decree
  - her_glorify_king
  - her_censor_press
  - her_royal_mobilisation
  marshal:
  - mar_declare_war
  - mar_royal_conscription
  - mar_defense_order
  - mar_offense_order
  - mar_military_vigilance
  chancellor:
  - cha_royal_almsgiving
  - cha_royal_stimulus
  - cha_royal_tutelage
  - cha_tax_intensification
  - cha_royal_market
  saint:
  - sai_royal_quarantine
  - sai_royal_healing
  - sai_holy_vaccination
  - sai_royal_provisions
  - sai_cursed_plague
