creation:
  display: "&cCommunist"
  description:
    - "&7Single-party system: power centralized in Politburo,"
    - ""
    - "&7• Leader: &fSecretary General (party elected)"
    - "&7• Ministers: &fPropaganda, Defense, Production"
    - "&7• Buff: &fDaily free money & EXP for all members"
    - "&7• Treasury: &fProgressive tax, automatic subsidies"
    - "&7• Order: &fNationalization, Media Censorship, Gulag"
  # Cost of founding a nation (withdrawn from the founder's Vault balance).
  cost: 500000
  # Minimum playtime hours before a player can found a nation.
  # Set to 0 to disable playtime requirements.
  min-playtime-hours: 0
  # Percentage of starting capital that goes directly into the new nation's treasury (0-100).
  # Calculated as a percentage of the cost value. Example: 50 = 50% of the cost.
  starting-treasury-percent: 80

# Politbiro Settings
politbiro:
  daily-salary: 20000
  propaganda:
    prefix: "&d[Propaganda]"
    daily-vault: 25000
    decision-cooldown-hours: 48
  defense:
    prefix: "&4[Defense]"
    daily-vault: 30000
    decision-cooldown-hours: 48
  treasury:
    prefix: "&6[Treasury]"
    daily-vault: 50000
    decision-cooldown-hours: 48
  health:
    prefix: "&a[Health]"
    daily-vault: 25000
    decision-cooldown-hours: 48


# Communist Settings
communist:
  # Duration of one General Secretary election cycle (real days). Default 7 days.
  # Party members vote each cycle, the winner automatically becomes the new General Secretary.
  election-cycle-days: 7

  # Communist Tax: collected every phase (default 7 Minecraft days = 140 minutes
  # real time, because 1 MC day = 20 minutes). Default tax value of 50 dollars
  # per member per phase.
  tax-phase-minutes: 140
  tax-amount: 50

  # Free Food: at this interval, the nation's treasury pays the cost-per-player
  # to distribute bread-count loaves to each online member.
  free-food-interval-hours: 24
  free-food-cost-per-player: 1000
  free-food-bread: 16

  # Politburo Salary: paid from the nation's treasury every 7 real days.
  minister-weekly-salary: 10000

  # Market Event Bonus: for every villager transaction while the effect is active,
  # nation members receive a money bonus equal to this value.
  market-event-bonus: 25

# =====================================================================
# Executive Orders available to each office of this government.
# List the order ids (defined in order.yaml) that each position may issue.
# The Secretary General may issue every order listed under
# "secretary_general"; each minister may issue only the orders listed
# under their own office. An order that is globally disabled in order.yaml
# never appears regardless of this list.
# =====================================================================
executive_order:
  secretary_general:
  - golden_age
  - war_economy
  - economic_recovery
  - environmental_protection
  - education_advancement
  - purge_protocol
  - presidential_pardon
  - tax_suspension
  - tax_surge
  minister_of_propaganda:
  - prop_global_broadcast
  - prop_national_broadcast
  - prop_leader_glorification
  - prop_media_censorship
  - prop_mobilization
  minister_of_defence:
  - def_declare_war
  - def_military_draft
  - def_defense_protocol
  - def_offense_protocol
  - def_military_emergency
  minister_of_treasury:
  - tre_distribution_program
  - tre_economic_stimulus
  - tre_education_program
  - tre_tax_intensification
  - tre_market_event
  minister_of_health:
  - hea_quarantine_protocol
  - hea_field_medicine
  - hea_vaccination_drive
  - hea_emergency_rations
  - hea_plague

