  title: "<yellow>     ⚖ NationCore Help ⚖"
  footer: "<gold>═══════════════════════════════════════"
  commands:
    info: "<white>/dc info <gray>- View government info"
    election: "<white>/dc election <gray>- View election status"
    candidates: "<white>/dc candidates <gray>- View list of candidates"
    vote: "<white>/dc vote <player> <gray>- Vote for candidate"
    register: "<white>/dc register <gray>- Register as candidate"
    endorse: "<white>/dc endorse <player> <gray>- Endorse candidate"
    campaign: "<white>/dc campaign <gray>- Send campaign message"
    treasury: "<white>/dc treasury <gray>- View national treasury"
    rate: "<white>/dc rate <1-5> <gray>- Rate the president"
    stats: "<white>/dc stats [player] <gray>- View statistics"
    history: "<white>/dc history <gray>- View presidential history"
  president_section: "<gold>═══ President ═══"
