# NationCore Language Configuration
# All plugin messages - can be reloaded with /dc admin reload
general:
  prefix: "&6[NationCore]&r"
  no_permission: "<red>You do not have access to admin commands!"
  player_only: "<red>This command is for players only!"
  player_not_found: "<red>Player not found!"
  unknown_command: "<red>Unknown command. Use <yellow>/dc help"
  config_reloaded: "<green>Config and language have been reloaded!"
  data_reset: "<yellow>{data} data has been reset."
  all_data_reset: "<red>ALL data has been reset!"

# Help Messages
help:
