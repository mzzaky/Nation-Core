name: NationCore
version: 2.0.0.SNAPSHOT-21
main: id.nationcore.NationCore
api-version: '1.21'
description: A comprehensive nation and government simulation plugin
author: NationCore Team
softdepend:
  - Vault
  - PlaceholderAPI

commands:
  nationcore:
    description: Main command for Nation Core plugin
    usage: /nationcore [subcommand]
    aliases: [dc, nc, nation, gov]

permissions:
  nation.vote:
    description: Allows voting in elections
    default: true
  nation.register:
    description: Allows registering as a candidate
    default: true
  nation.endorse:
    description: Allows endorsing candidates
    default: true
  nation.donate:
    description: Allows donating to treasury
    default: true
  nation.president:
    description: President-only commands
    default: false
  nation.cabinet:
    description: Cabinet member commands
    default: false
  nation.tax:
    description: View tax information
    default: true
  nation.tax.exempt:
    description: Exempt from global taxes
    default: false
  nation.create:
    description: Allows founding a new nation
    default: true
  nation.join:
    description: Allows joining an existing nation
    default: true
  nation.capital:
    description: Allows managing nation capital (claim/teleport)
    default: true
  nation.admin:
    description: Admin commands
    default: op
